<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sketch2Render</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f0f0f;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        h1 {
            font-size: 24px;
            font-weight: 500;
            letter-spacing: 2px;
            color: #ccc;
        }

        .container {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .panel {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        canvas {
            background: #000;
            border: 1px solid #333;
            cursor: crosshair;
            border-radius: 4px;
        }

        #output {
            width: 512px;
            height: 512px;
            background: #111;
            border: 1px solid #333;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #444;
            font-size: 14px;
        }

        #output img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 4px;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 8px 16px;
            background: #222;
            color: #ccc;
            border: 1px solid #444;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }

        button:hover {
            background: #333;
        }

        #status {
            font-size: 12px;
            color: #555;
            height: 16px;
        }
    </style>
</head>

<body>
    <h1>SKETCH2RENDER</h1>
    <div class="container">
        <div class="panel">
            <span class="label">Draw your sketch</span>
            <canvas id="canvas" width="512" height="512"></canvas>
            <div class="controls">
                <!-- <button onclick="clearCanvas()">Clear</button>
                <button onclick="toggleEraser()" id="eraserBtn">Eraser</button> -->
                <button onclick="clearCanvas()">Clear</button>
                <button onclick="toggleEraser()" id="eraserBtn">Eraser</button>
                <button onclick="generate()" id="generateBtn">Generate</button>
            </div>
        </div>
        <div class="panel">
            <span class="label">Generated output</span>
            <div id="output">waiting for sketch...</div>
        </div>
    </div>
    <div id="status"></div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const output = document.getElementById('output');
        const status = document.getElementById('status');

        // canvas setup
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        let drawing = false;
        let erasing = false;
        let debounceTimer = null;

        canvas.addEventListener('mousedown', e => { drawing = true; ctx.beginPath(); });
        // canvas.addEventListener('mouseup', () => { drawing = false; scheduleGenerate(); });
        canvas.addEventListener('mouseup', () => { drawing = false; });
        canvas.addEventListener('mouseleave', () => { drawing = false; });
        canvas.addEventListener('mousemove', e =>
        {
            if (!drawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            ctx.strokeStyle = erasing ? '#000' : '#fff';
            ctx.lineWidth = erasing ? 20 : 3;
            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        });

        function clearCanvas()
        {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            output.innerHTML = 'waiting for sketch...';
        }

        function toggleEraser()
        {
            erasing = !erasing;
            document.getElementById('eraserBtn').style.background = erasing ? '#444' : '#222';
        }

        // function scheduleGenerate()
        // {
        //     clearTimeout(debounceTimer);
        //     debounceTimer = setTimeout(generate, 800);
        // }

        async function generate()
        {
            status.textContent = 'generating...';
            const imageData = canvas.toDataURL('image/png').split(',')[1];

            try
            {
                const response = await fetch('http://127.0.0.1:8000/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: imageData })
                });

                const data = await response.json();
                output.innerHTML = `<img src="data:image/png;base64,${data.image}">`;
                status.textContent = 'done';
            } catch (err)
            {
                status.textContent = 'error: ' + err.message;
            }
        }
    </script>
</body>

</html>
