server {
    listen 80;

    # serve the frontend
    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # proxy API requests to FastAPI
    location /generate {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    location /health {
        proxy_pass http://api:8000;
    }
}