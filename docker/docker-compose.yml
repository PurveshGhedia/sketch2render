version: "3.8"

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ../checkpoints:/app/checkpoints
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app/src

  nginx:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ../frontend:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api
